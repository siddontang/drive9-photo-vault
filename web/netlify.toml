[build]
  command = "npm run build"
  publish = "dist"

# HTML/app shell should stay fresh so mobile in-app browsers pick up new bundles.
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "no-cache, must-revalidate"

# Fingerprinted Vite assets are safe to cache aggressively.
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"


# Keep browser traffic same-origin. Netlify proxies API calls to the Cloudflare Worker,
# avoiding direct browser dependency on workers.dev in regions where it is unreliable.
[[redirects]]
  from = "/api/*"
  to = "https://drive9-photo-api.siddontang.workers.dev/api/:splat"
  status = 200
  force = true

[[redirects]]
  from = "/openapi.json"
  to = "https://drive9-photo-api.siddontang.workers.dev/openapi.json"
  status = 200
  force = true

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
