<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="PhotoVault">
  <defs>
    <linearGradient id="bg" x1="10" y1="6" x2="56" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#38bdf8"/>
      <stop offset="0.48" stop-color="#2563eb"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="tag" x1="39" y1="10" x2="57" y2="28" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset="1" stop-color="#f97316"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="3" flood-color="#0f172a" flood-opacity="0.25"/>
    </filter>
  </defs>

  <rect x="5" y="5" width="54" height="54" rx="16" fill="url(#bg)"/>

  <!-- photo card -->
  <rect x="15" y="18" width="34" height="29" rx="7" fill="white" opacity="0.96" filter="url(#shadow)"/>
  <path d="M18 41l9.5-10 6.4 6.8 4.2-4.5L47 42.5V44H18z" fill="#93c5fd"/>
  <circle cx="39.5" cy="27" r="4" fill="#2563eb" opacity="0.9"/>

  <!-- tag corner: search/organize cue -->
  <path d="M43 11h9.5a4.5 4.5 0 0 1 4.5 4.5V25L44 38 31 25z" fill="url(#tag)" filter="url(#shadow)"/>
  <circle cx="49.3" cy="18.7" r="2.2" fill="white" opacity="0.9"/>

  <!-- subtle vault/check mark -->
  <path d="M23 25.5h12" stroke="#0f172a" stroke-width="2.6" stroke-linecap="round" opacity="0.16"/>
  <path d="M24 51h16" stroke="white" stroke-width="3.2" stroke-linecap="round" opacity="0.35"/>
</svg>
